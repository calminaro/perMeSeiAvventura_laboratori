name: Build Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-gestionale:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build Gestionale Image
      run: |
        docker build . \
          --file Dockerfile \
          --tag ghcr.io/calminaro/permeseiavventura_laboratori:${{ github.sha }} \
          --tag ghcr.io/calminaro/permeseiavventura_laboratori:latest

    - name: Push Gestionale Image
      run: |
        docker push ghcr.io/calminaro/permeseiavventura_laboratori:${{ github.sha }}
        docker push ghcr.io/calminaro/permeseiavventura_laboratori:latest
