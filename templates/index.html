<!DOCTYPE html>
<html lang="it-IT">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="icon" href="/static/cropped-ago-corallo-32x32.png" sizes="192x192" />
    <title>PerMeSeiAvventura Laboratori</title>
  </head>
  <body style="background-color: #d8f3ee;">
    <header>
      <div
        class="shadow-sm p-3 mb-3 text-white"
        style="
          background-image: url('/static/header-per-me-sei-avventura.jpg');
          background-size: cover;
          background-position: center;
          min-height: 220px;
          display: flex;
          align-items: center;
          justify-content: center;
        "
      ></div>
    </header>
    <main>
      <div class="col">
        <div class="shadow-sm p-3 mx-5 mb-3 text-center rounded" style="background-color: #7fd6ca;">
          <h3>Accedi ai laboratori</h3>
          <form method="post" id="form_iscriviti">
            <div class="mb-3">
              <label for="cod_censimento" class="form-label">Inserisci il tuo codice censimento</label>
              <input type="text" class="form-control" id="cod_censimento" name="cod_censimento" placeholder="CODICE CENSIMENTO" required>
            </div>
            <button type="submit" class="btn btn-success" aria-describedby="send_descr" onclick="inviaForm()">Verifica iscrizione al convegno!</button>
          </form>
        </div>
      </div>
    </main>
    <footer></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  </body>
</html>
